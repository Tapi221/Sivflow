name: Format imports once

on:
  push:
    branches:
      - main
    paths:
      - scripts/format-imports.mjs
      - .github/workflows/format-imports-on-push.yml

permissions:
  contents: write

jobs:
  format-imports:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/format-imports.mjs
      - name: Commit formatted imports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: keep import declarations single-line"
          git push
