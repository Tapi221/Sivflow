name: CI
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
      - run: npm install
      - run: npm run verify:design-tokens
      - run: npm run verify:source-conventions
      - run: npm run check:nbstore-worker:source
      - run: npm run typecheck
      - run: npm run build
      - run: npm run check:nbstore-worker
