name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run verify:design-tokens

      - name: Guard legacy src/tests path
        run: |
          set -euo pipefail
          if [ -d "src/tests" ]; then
            echo "Legacy test directory detected: src/tests"
            exit 1
          fi

      - name: Guard legacy card-folder usage
        run: |
          set -euo pipefail
          if rg -n "moveCardToFolder" src; then
            echo "Unexpected moveCardToFolder usage found."
            exit 1
          fi

          DISALLOWED_CARD_FOLDER="$(rg -n "card\\.folderId" src | rg -v "cardFolder\\.ts|legacyFolderSync\\.ts|legacyCardSetMigrationBackfill\\.ts|SyncServiceV2\\.ts|localdb[\\\\/]schema\\.ts" || true)"
          if [ -n "$DISALLOWED_CARD_FOLDER" ]; then
            echo "Disallowed card.folderId direct access detected:"
            echo "$DISALLOWED_CARD_FOLDER"
            exit 1
          fi

          rg -n "folderId: targetSet\\.folderId" src || true

      - run: npm run lint

      - run: npm run preflight

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
        working-directory: functions

      - run: npm run build
        working-directory: functions
