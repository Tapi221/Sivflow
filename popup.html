<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Approval Hub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Approval Hub</h1>
        <p>ChatGPTタブの承認待ちをまとめて表示します。</p>
      </div>
      <div class="headerActions">
        <button id="settingsButton" class="iconButton" type="button" aria-label="設定" aria-haspopup="dialog" aria-controls="settingsDialog" title="設定">⚙</button>
        <button id="refresh" type="button">更新</button>
      </div>
    </header>

    <section class="modeBar" aria-label="承認モード">
      <span id="modeLabel">手動承認</span>
      <fieldset class="modeOptions">
        <legend>承認モード</legend>
        <label><input id="modeManual" name="approvalMode" type="radio" value="manual" />手動</label>
        <label><input id="modeAll" name="approvalMode" type="radio" value="all" />全て自動</label>
        <label><input id="modeSelected" name="approvalMode" type="radio" value="selected" />選択チャット</label>
      </fieldset>
    </section>

    <main id="list" aria-live="polite"></main>

    <footer>
      <button id="approveSelected" type="button">選択したものを承認</button>
      <span id="status"></span>
    </footer>

    <dialog id="settingsDialog" aria-labelledby="settingsTitle">
      <form class="settingsDialog" method="dialog">
        <div class="settingsDialogHeader">
          <div>
            <h2 id="settingsTitle">設定</h2>
            <p>チャット削除ボタンの表示を切り替えます。</p>
          </div>
          <button class="iconButton" type="submit" aria-label="設定を閉じる">×</button>
        </div>

        <section class="settingsSection">
          <h3>削除ボタン</h3>
          <label class="settingToggle">
            <input id="deleteButtonToggle" type="checkbox" />
            <span class="switchTrack" aria-hidden="true"></span>
            <span>チャット画面に削除ボタンを表示する</span>
          </label>
          <p class="settingHint">オフにすると、ChatGPT画面上部の削除ボタンを非表示にします。</p>
        </section>

        <div class="settingsDialogActions">
          <button type="submit">閉じる</button>
        </div>
      </form>
    </dialog>

    <template id="emptyTemplate">
      <section class="empty">
        <strong>承認待ちはありません</strong>
        <p>ChatGPTタブで承認カードが表示されたら、更新を押してください。</p>
      </section>
    </template>

    <template id="approvalTemplate">
      <article class="card">
        <label class="row">
          <input class="select" type="checkbox" checked />
          <div class="summary">
            <h2 class="title"></h2>
            <p class="chatName"></p>
            <p class="meta"></p>
          </div>
        </label>
        <p class="preview"></p>
        <label class="chatAuto">
          <input class="chatAutoToggle" type="checkbox" />
          <span class="switchTrack" aria-hidden="true"></span>
          <span>このチャットを自動承認</span>
        </label>
        <div class="actions">
          <button class="openTab" type="button">タブを開く</button>
          <button class="approve" type="button">承認</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
