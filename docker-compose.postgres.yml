services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sivflow
      POSTGRES_PASSWORD: sivflow_pass
      POSTGRES_DB: sivflow
    ports:
      - "5432:5432"
    volumes:
      - sivflow-postgres-data:/var/lib/postgresql/data
      - ./functions/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sivflow -d sivflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sivflow-postgres-data:
