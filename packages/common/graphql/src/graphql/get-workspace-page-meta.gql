query getWorkspacePageMetaById($id: String!, $pageId: String!) {
  workspace(id: $id) {
    doc(docId: $pageId) {
      meta {
        createdAt
        updatedAt
        createdBy {
          name
          avatarUrl
        }
        updatedBy {
          name
          avatarUrl
        }
      }
    }
  }
}
