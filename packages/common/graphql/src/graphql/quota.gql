query quota {
  currentUser {
    id
    quota {
      name
      blobLimit
      storageQuota
      usedStorageQuota
      historyPeriod
      memberLimit
      humanReadable {
        name
        blobLimit
        storageQuota
        usedStorageQuota
        historyPeriod
        memberLimit
      }
    }
  }
}
