# プロジェクト全体の Gradle 設定です。

# IDE（Android Studio など）を使う場合:
# IDE から設定した Gradle 設定は、このファイルの設定より優先されます。

# ビルド環境の設定方法の詳細は、次を参照してください。
# http://www.gradle.org/docs/current/userguide/build_environment.html

# daemon process で使う JVM 引数を指定します。
# メモリ設定を調整するときに特に便利です。
org.gradle.jvmargs=-Xmx1536m

# 設定すると、Gradle は incubating parallel mode で実行されます。
# この option は、分離された project でのみ使ってください。詳細は次を参照してください。
# http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
# org.gradle.parallel=true

# Android OS に同梱される package と、アプリの APK に含まれる package を区別しやすくするため、
# AndroidX package 構造を使います。
# https://developer.android.com/topic/libraries/support-library/androidx-rn
android.useAndroidX=true
ksp.incremental.apt=true
ksp.useKSP2=true
