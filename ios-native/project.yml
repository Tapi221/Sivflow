name: FlashCardMasterNative
options:
  minimumXcodeGenVersion: 2.39.0
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  FlashCardMasterNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Features
      - path: Core
      - path: Persistence
      - path: DesignSystem
    resources:
      - path: Persistence/Samples/sample-snapshot.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akari221.FlashCardMasterNative
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FlashCardMasterNative
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
