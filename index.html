<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="robots" content="%VITE_ROBOTS_CONTENT%" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="効率的な暗記学習をサポートする manifolmia"
    />
    <script>
      (function () {
        // ロード時の緑色フラッシュを防ぐため、localStorageから即座に色を反映
        const color =
          localStorage.getItem("flashcard-accent-color") || "#689A98";
        const root = document.documentElement;

        const toRgb = (hex) => {
          const match = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(
            hex || "",
          );
          if (!match) return "104 154 152";
          const r = parseInt(match[1], 16);
          const g = parseInt(match[2], 16);
          const b = parseInt(match[3], 16);
          return `${r} ${g} ${b}`;
        };

        // Tailwindのprimary系ユーティリティが初回描画から正しい色を使えるようにする
        root.style.setProperty("--color-primary-600-hex", color);
        root.style.setProperty("--color-primary-600", toRgb(color));
        root.style.setProperty("--accent-color", color);

        const meta = document.createElement("meta");
        meta.name = "theme-color";
        meta.content = color;
        document.head.appendChild(meta);
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="manifolmia" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Manifolia.</title>
    <style>
      html,
      body {
        background-color: #f8fafb;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: #f8fafb;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
