<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="robots" content="%VITE_ROBOTS_CONTENT%" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="効率的な暗記学習をサポートする manifolmia"
    />
    <script>
      (function () {
        // ロード時の緑色フラッシュを防ぐため、localStorageから即座に色を反映
        const color =
          localStorage.getItem("flashcard-accent-color") || "#689A98";
        const root = document.documentElement;

        const toRgb = (hex) => {
          const match = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(
            hex || "",
          );
          if (!match) return "104 154 152";
          const r = parseInt(match[1], 16);
          const g = parseInt(match[2], 16);
          const b = parseInt(match[3], 16);
          return `${r} ${g} ${b}`;
        };

        const hexToRgb = (hex) => {
          const match = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(
            hex || "",
          );
          if (!match) return { r: 104, g: 154, b: 152 };
          return {
            r: parseInt(match[1], 16),
            g: parseInt(match[2], 16),
            b: parseInt(match[3], 16),
          };
        };

        const mixColor = (color1, color2, weight) => {
          const w1 = weight;
          const w2 = 1 - weight;
          const r = Math.round(color1.r * w1 + color2.r * w2);
          const g = Math.round(color1.g * w1 + color2.g * w2);
          const b = Math.round(color1.b * w1 + color2.b * w2);
          return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
        };

        const generatePalette = (baseHex) => {
          const base = hexToRgb(baseHex);
          const white = { r: 255, g: 255, b: 255 };
          const black = { r: 0, g: 0, b: 0 };
          return {
            50: mixColor(white, base, 0.95),
            100: mixColor(white, base, 0.9),
            200: mixColor(white, base, 0.7),
            300: mixColor(white, base, 0.5),
            400: mixColor(white, base, 0.3),
            500: mixColor(white, base, 0.1),
            700: mixColor(black, base, 0.1),
            800: mixColor(black, base, 0.2),
            900: mixColor(black, base, 0.3),
          };
        };

        // Tailwindのprimary系ユーティリティが初回描画から正しい色を使えるようにする
        root.style.setProperty("--color-primary-600-hex", color);
        root.style.setProperty("--color-primary-600", toRgb(color));
        root.style.setProperty("--accent-color", color);
        const palette = generatePalette(color);
        root.style.setProperty("--color-primary-50", palette[50]);
        root.style.setProperty("--color-primary-100", palette[100]);
        root.style.setProperty("--color-primary-200", palette[200]);
        root.style.setProperty("--color-primary-300", palette[300]);
        root.style.setProperty("--color-primary-400", palette[400]);
        root.style.setProperty("--color-primary-500", palette[500]);
        root.style.setProperty("--color-primary-700", palette[700]);
        root.style.setProperty("--color-primary-800", palette[800]);
        root.style.setProperty("--color-primary-900", palette[900]);

        const meta = document.createElement("meta");
        meta.name = "theme-color";
        meta.content = color;
        document.head.appendChild(meta);
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="manifolmia" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Manifolia.</title>
    <style>
      html,
      body {
        background-color: #f8fafb;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: #f8fafb;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
