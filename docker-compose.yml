services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sivflow
      POSTGRES_PASSWORD: sivflow
      POSTGRES_DB: sivflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: