<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>オフライン</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
      }
      .box {
        max-width: 520px;
        margin: 0 auto;
      }
      button {
        padding: 10px 14px;
        font-size: 14px;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>オフラインです</h1>
      <p class="muted">通信が戻ったら自動で再読み込みします。</p>
      <button onclick="location.reload()">再読み込み</button>
    </div>
    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
