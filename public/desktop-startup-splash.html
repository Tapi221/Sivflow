<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sivflow</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      body {
        display: grid;
        place-items: center;
      }

      .splash {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 48%, rgba(125, 215, 255, 0.2), rgba(255, 255, 255, 0) 42%), #ffffff;
      }

      .splash__logo {
        width: 236px;
        height: 236px;
        opacity: 0;
        overflow: visible;
        animation: sivflow-logo-form 1750ms cubic-bezier(0.22, 1, 0.36, 1) both;
        will-change: filter, opacity, transform;
      }

      .splash__logo-ribbons {
        animation: sivflow-ribbons-settle 1750ms cubic-bezier(0.22, 1, 0.36, 1) both;
        transform-box: fill-box;
        transform-origin: center;
      }

      .splash__logo-glow {
        animation: sivflow-glow-form 1750ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes sivflow-logo-form {
        0% {
          opacity: 0.04;
          filter: blur(26px) brightness(1.34) saturate(1.08);
          transform: scale(0.985);
        }

        34% {
          opacity: 0.38;
          filter: blur(17px) brightness(1.2) saturate(1.05);
          transform: scale(0.99);
        }

        68% {
          opacity: 0.84;
          filter: blur(6px) brightness(1.08) saturate(1.02);
          transform: scale(0.997);
        }

        100% {
          opacity: 1;
          filter: blur(0) brightness(1) saturate(1);
          transform: scale(1);
        }
      }

      @keyframes sivflow-ribbons-settle {
        0% {
          clip-path: inset(42% 38% 42% 38% round 999px);
        }

        62% {
          clip-path: inset(5% 3% 5% 3% round 96px);
        }

        100% {
          clip-path: inset(0 0 0 0 round 0);
        }
      }

      @keyframes sivflow-glow-form {
        0% {
          opacity: 0.18;
        }

        60% {
          opacity: 0.72;
        }

        100% {
          opacity: 0.9;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-label="Sivflow 起動中">
      <svg class="splash__logo" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Sivflow logo">
        <defs>
          <linearGradient id="sivflowSplashTop" x1="46" y1="258" x2="486" y2="42" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#00142d" />
            <stop offset="0.36" stop-color="#062849" />
            <stop offset="0.58" stop-color="#1f8bc4" />
            <stop offset="0.78" stop-color="#32bff1" />
            <stop offset="1" stop-color="#effcff" />
          </linearGradient>
          <linearGradient id="sivflowSplashMiddle" x1="133" y1="276" x2="428" y2="213" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#00142d" />
            <stop offset="0.5" stop-color="#0b355d" />
            <stop offset="0.82" stop-color="#7ecde9" />
            <stop offset="1" stop-color="#f7fdff" />
          </linearGradient>
          <linearGradient id="sivflowSplashBottom" x1="24" y1="466" x2="476" y2="229" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#00142d" />
            <stop offset="0.36" stop-color="#062345" />
            <stop offset="0.66" stop-color="#1daee6" />
            <stop offset="0.9" stop-color="#58cef3" />
            <stop offset="1" stop-color="#effcff" />
          </linearGradient>
          <radialGradient id="sivflowSplashTopGlow" cx="79%" cy="12%" r="48%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.78" />
            <stop offset="0.35" stop-color="#b9efff" stop-opacity="0.36" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <radialGradient id="sivflowSplashBottomGlow" cx="78%" cy="76%" r="46%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.5" />
            <stop offset="0.44" stop-color="#6edcff" stop-opacity="0.2" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <filter id="sivflowSplashShadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#001a38" flood-opacity="0.12" />
          </filter>
        </defs>
        <g class="splash__logo-ribbons" filter="url(#sivflowSplashShadow)">
          <path fill="url(#sivflowSplashTop)" d="M485 41C468 73 444 99 410 115C396 121 380 122 377 122H273C231 122 180 127 136 157C88 190 62 240 73 277C82 307 111 335 152 352C79 325 38 271 45 204C51 142 88 87 137 60C171 41 211 31 239 31H452C475 31 495 37 485 41Z" />
          <path fill="url(#sivflowSplashMiddle)" d="M138 300C149 268 164 246 194 224C214 210 238 207 251 207H427C409 238 389 263 360 284C333 303 298 302 292 302H141C139 302 138 301 138 300Z" />
          <path fill="url(#sivflowSplashBottom)" d="M466 206C485 252 481 315 463 336C442 388 405 430 348 459C318 474 279 481 210 481H26C25 480 25 478 25 477C46 427 79 397 116 389C126 386 136 385 141 385H259C317 384 369 370 409 326C442 290 461 245 466 206Z" />
          <rect class="splash__logo-glow" width="512" height="512" fill="url(#sivflowSplashTopGlow)" />
          <rect class="splash__logo-glow" width="512" height="512" fill="url(#sivflowSplashBottomGlow)" />
        </g>
      </svg>
    </main>
  </body>
</html>
