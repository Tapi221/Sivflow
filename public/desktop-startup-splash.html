<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sivflow</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      body {
        display: grid;
        place-items: center;
      }

      .splash {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 50% 48%, rgba(125, 215, 255, 0.22), rgba(255, 255, 255, 0) 42%),
          #ffffff;
      }

      .splash__logo {
        width: 236px;
        height: 236px;
        object-fit: contain;
        opacity: 0.96;
        animation: sivflow-logo-form 1450ms cubic-bezier(0.22, 1, 0.36, 1) both;
        will-change: filter, opacity, transform;
      }

      @keyframes sivflow-logo-form {
        0% {
          opacity: 0.08;
          filter: blur(26px) brightness(1.68) saturate(1.18);
          transform: scale(0.985);
        }

        34% {
          opacity: 0.42;
          filter: blur(17px) brightness(1.42) saturate(1.13);
          transform: scale(0.992);
        }

        68% {
          opacity: 0.86;
          filter: blur(6px) brightness(1.13) saturate(1.05);
          transform: scale(0.998);
        }

        100% {
          opacity: 1;
          filter: blur(0) brightness(1) saturate(1);
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-label="Sivflow 起動中">
      <img class="splash__logo" src="/icon.svg" alt="Sivflow" draggable="false" />
    </main>
  </body>
</html>
